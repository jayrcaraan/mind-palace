services:
  postgres:
    # PostgreSQL 16 + pgvector + Apache AGE (built locally — graph works out of the box)
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    image: mind-palace-db:pg16
    container_name: mp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mindpalace}
      POSTGRES_USER: ${POSTGRES_USER:-mindpalace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    # Schema is applied by the backend on startup via `alembic upgrade head`.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindpalace} -d ${POSTGRES_DB:-mindpalace}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: mind-palace-backend:latest
    container_name: mp_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # All app config comes straight from .env — edit .env, nothing to add here.
    env_file:
      - .env
    environment:
      # Only values compose must derive (DB URL uses the `postgres` service host)
      # or that are fixed to the container live here; everything else is in .env.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mindpalace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mindpalace}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-mindpalace}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mindpalace}
      BLOB_STORAGE_PATH: /data/blobs
    volumes:
      - blob_data:/data/blobs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/live"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2g

volumes:
  postgres_data:
  blob_data:
